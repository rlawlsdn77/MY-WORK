<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shifter — Mid Twilight</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: '#1c1c1f',
          paper: '#faf9f7',
          accent: '#5b4de0',
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
        },
      },
    },
  };
</script>

<style>
  html { scroll-behavior: smooth; }
  body { background-color: #faf9f7; }
  .tag {
    font-family: 'JetBrains Mono', monospace;
  }
  .diagram-fallback {
    background-image: repeating-linear-gradient(45deg, #eceae5 0, #eceae5 1px, transparent 1px, transparent 12px);
  }
</style>
</head>
<body class="text-ink font-sans antialiased">

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ---------- 콘텐츠 데이터 (실제 프로젝트 기준) ---------- */

const TAGS = ["Unity", "C#", "이벤트 기반"];

const CODE_1 = `public class PressureButton : MonoBehaviour
{
    [SerializeField] private UnityEvent onPressed;

    private void OnTriggerEnter2D(Collider2D collision)
    {
        if (collision.gameObject.name != "Shifter") return;
        onPressed.Invoke();
    }
}`;

const CODE_2 = `private float ResolveAxisMovement(float move, Vector3 axis)
{
    if (move == 0f) return 0f;

    Vector3 dir = (move > 0f ? axis : -axis);
    float distance = Mathf.Abs(move);
    Bounds box = GetCastBox();

    RaycastHit2D hit = Physics2D.BoxCast(
        box.center, box.size, 0f, dir, distance, collisionLayer);

    if (hit.collider == null) return move;

    float allowed = Mathf.Max(0, hit.distance - skinWidth);
    return Mathf.Sign(move) * allowed;
}`;

const DIAGRAM_PAGES = [
  {
    key: "player",
    badge: "핵심 흐름",
    title: "Player & Core",
    src: "assets/diagrams/01_player.png",
    points: [
      "ShifterController가 CharacterController2D(이동)·Shifter(체력/속성)를 조합해 입력을 처리",
      "Shifter는 ITakeDamage를 구현해, 피격 판정 코드가 구체 타입을 몰라도 되게 함",
    ],
  },
  {
    key: "boss-core",
    badge: "보스 관리",
    title: "Boss Core",
    src: "assets/diagrams/02_boss_core.png",
    points: [
      "BossManager가 패턴 진행·보스 상태를 총괄하는 중앙 관리자 역할",
      "BossHeart는 피격 판정만 담당하고, 실제 데미지 처리는 BossManager에 위임",
    ],
  },
  {
    key: "boss-pattern",
    badge: "전략 패턴",
    title: "Boss Pattern System",
    src: "assets/diagrams/03_boss_pattern.png",
    points: [
      "IBossPattern 인터페이스로 3종 패턴(Eruption/Rampage/Razer)을 동일하게 교체·호출",
      "새 패턴 추가 시 BossManager 수정 없이 IBossPattern만 구현하면 됨",
    ],
  },
  {
    key: "stage1",
    badge: "퍼즐 · STAGE 1",
    title: "STAGE 1",
    src: "assets/diagrams/04_stage1.png",
    points: [
      "BulletLauncher → Bullet 생성, Bullet은 ITakeDamage로 대상 피격 여부만 확인",
      "버튼 3종(BoxGoal/ButtonReset/ButtontoLight)이 각자 독립적으로 문·조명 상태를 갱신",
    ],
  },
  {
    key: "stage2",
    badge: "퍼즐 · STAGE 2",
    title: "STAGE 2",
    src: "assets/diagrams/05_stage2.png",
    points: [
      "LaserPuzzleManager가 카메라·조준 상태를 전환하고 LightBeam이 실제 반사 계산을 수행",
      "LightBeam → Mirror(반사) → LightSensor(명중) 순으로 신호가 전달되는 구조",
    ],
  },
  {
    key: "ui",
    badge: "UI 바인딩",
    title: "UI",
    src: "assets/diagrams/06_ui.png",
    points: [
      "BossHealthUI·BossTimerUI는 매 프레임 Boss/BossManager 상태를 읽기만 하는 단방향 구조",
      "OnBosspattern은 트리거 진입 시 보스 UI 표시 여부만 전환",
    ],
  },
  {
    key: "common",
    badge: "공통 유틸",
    title: "Common",
    src: "assets/diagrams/07_common.png",
    points: [
      "Red·PressureButton 등 스테이지 공통 오브젝트는 서로 참조 없이 독립적으로 동작",
      "Red는 ITakeDamage로 대상을 확인해, Shifter 구체 타입에 의존하지 않음",
    ],
  },
];

/* ---------- 공용 컴포넌트 ---------- */

function SectionTitle({ index, title }) {
  return (
    <div className="flex items-baseline gap-3 mb-6">
      <span className="tag text-sm text-accent/70">{index}</span>
      <h2 className="text-2xl font-bold tracking-tight">{title}</h2>
      <div className="flex-1 h-px bg-ink/10 ml-2"></div>
    </div>
  );
}

function CodeBlock({ code }) {
  return (
    <pre className="tag text-[13px] leading-relaxed bg-ink text-paper/90 rounded-xl p-5 overflow-x-auto border border-ink/10">
      <code>{code}</code>
    </pre>
  );
}

function Feature({ title, code, children }) {
  return (
    <div className="grid md:grid-cols-2 gap-6 items-start py-8 border-t border-ink/10 first:border-t-0 first:pt-0">
      <div>
        <h3 className="font-semibold text-lg mb-2">{title}</h3>
        <div className="text-[15px] leading-relaxed text-ink/70">{children}</div>
      </div>
      <CodeBlock code={code} />
    </div>
  );
}

function RetroColumn({ label, items, tone }) {
  const dot = {
    good: "bg-emerald-500",
    bad: "bg-amber-500",
    next: "bg-accent",
  }[tone];
  return (
    <div>
      <h3 className="tag text-xs uppercase tracking-widest text-ink/40 mb-4">{label}</h3>
      <ul className="space-y-3">
        {items.map((t, i) => (
          <li key={i} className="flex gap-3 text-[15px] leading-relaxed text-ink/80">
            <span className={`mt-2 h-1.5 w-1.5 rounded-full flex-none ${dot}`}></span>
            <span>{t}</span>
          </li>
        ))}
      </ul>
    </div>
  );
}

function DiagramPageImage({ src, title }) {
  const [failed, setFailed] = useState(false);
  if (failed) {
    return (
      <div className="diagram-fallback aspect-[16/9] w-full rounded-2xl border border-dashed border-ink/20 flex flex-col items-center justify-center text-center px-6">
        <p className="tag text-xs text-ink/40 mb-1">{src}</p>
        <p className="text-sm text-ink/50">이 경로에 다이어그램 이미지를 넣으면 여기에 표시됩니다.</p>
      </div>
    );
  }
  return (
    <img
      key={src}
      src={src}
      alt={`Shifter 클래스 다이어그램 — ${title}`}
      onError={() => setFailed(true)}
      className="w-full rounded-xl object-contain bg-white"
    />
  );
}

function DiagramPager() {
  const [idx, setIdx] = useState(0);
  const page = DIAGRAM_PAGES[idx];

  return (
    <div>
      {/* 페이지 탭 */}
      <div className="flex gap-1.5 flex-wrap mb-6">
        {DIAGRAM_PAGES.map((p, i) => (
          <button
            key={p.key}
            onClick={() => setIdx(i)}
            className={`tag text-xs px-3 py-1.5 rounded-full border transition-colors ${
              i === idx
                ? "bg-accent text-white border-accent"
                : "border-ink/15 text-ink/50 hover:border-accent/50 hover:text-accent"
            }`}
          >
            {p.title}
          </button>
        ))}
      </div>

      <div className="grid md:grid-cols-[minmax(0,220px)_1fr] gap-8 items-start">
        {/* 좌측 설명 */}
        <div>
          <span className="tag text-[11px] px-2.5 py-1 rounded-full border border-accent/30 text-accent/80 inline-block mb-4">
            {page.badge}
          </span>
          <h3 className="font-semibold text-lg mb-4">{page.title}</h3>
          <ul className="space-y-3">
            {page.points.map((t, i) => (
              <li key={i} className="flex gap-2.5 text-[14px] leading-relaxed text-ink/70">
                <span className="mt-2 h-1.5 w-1.5 rounded-full flex-none bg-accent"></span>
                <span>{t}</span>
              </li>
            ))}
          </ul>
        </div>

        {/* 우측 다이어그램 */}
        <div className="rounded-2xl border border-ink/10 bg-white p-5">
          <DiagramPageImage src={page.src} title={page.title} />
        </div>
      </div>
    </div>
  );
}

/* ---------- 페이지 ---------- */

function App() {
  return (
    <div className="max-w-3xl mx-auto px-6 md:px-0 py-20 md:py-28">

      {/* 상단 */}
      <header className="mb-24">
        <p className="tag text-sm text-accent mb-3">Unity Project</p>
        <h1 className="text-5xl md:text-6xl font-extrabold tracking-tight leading-none mb-3">
          Shifter
        </h1>
        <p className="text-lg text-ink/40 mb-6 italic">Mid Twilight</p>
        <p className="text-xl leading-relaxed text-ink/70 max-w-xl mb-8">
          Shift 키 하나로 세계의 명암을 뒤집는 2D 퍼즐-액션 플랫포머.
        </p>
        <div className="flex gap-2 flex-wrap">
          {TAGS.map((t) => (
            <span key={t} className="tag text-xs px-3 py-1.5 rounded-full border border-ink/15 text-ink/60">
              {t}
            </span>
          ))}
        </div>
      </header>

      {/* 개요 */}
      <section className="mb-24">
        <SectionTitle index="01" title="개요" />
        <div className="grid md:grid-cols-2 gap-10">
          <div>
            <h3 className="tag text-xs uppercase tracking-widest text-ink/40 mb-3">What</h3>
            <p className="text-[15px] leading-relaxed text-ink/70">
              플레이어는 Shift 키로 White/Black 두 속성을 오가며, 속성이 일치하는 발판과
              장애물만 통과할 수 있다. 이 하나의 규칙이 이동, 퍼즐, 보스전 전체를 관통하며
              3개 스테이지(박스 이동 퍼즐, 거울 반사 퍼즐, 벽 이동 퍼즐)와 3패턴 로테이션
              보스전으로 확장된다.
            </p>
          </div>
          <div>
            <h3 className="tag text-xs uppercase tracking-widest text-ink/40 mb-3">Why</h3>
            <p className="text-[15px] leading-relaxed text-ink/70">
              단일 메카닉이 얼마나 멀리 응용될 수 있는지 검증하고 싶었다. 동시에 Unity
              기본 Rigidbody 충돌 대신 BoxCast 기반 커스텀 캐릭터 컨트롤러와, UnityEvent로
              오브젝트 간 결합을 최소화한 이벤트 기반 구조를 직접 설계해보는 것이 목표였다.
            </p>
          </div>
        </div>
      </section>

      {/* 시스템 구조 */}
      <section className="mb-24">
        <SectionTitle index="02" title="시스템 구조" />
        <p className="text-[15px] leading-relaxed text-ink/70 mb-8 max-w-xl">
          30여 개 클래스를 한 장에 담는 대신, 기능 단위 7개 다이어그램으로 나눴다.
          위 탭을 눌러 서브시스템별 클래스 관계를 확인할 수 있다.
        </p>
        <DiagramPager />
      </section>

      {/* 핵심 기능 */}
      <section className="mb-24">
        <SectionTitle index="03" title="핵심 기능" />

        <Feature title="이벤트 기반 트리거 — PressureButton" code={CODE_1}>
          압력판은 자신을 누른 대상이 이후 무엇을 해야 하는지 전혀 알지 못한다.
          <code className="tag text-[13px] bg-ink/5 px-1.5 py-0.5 rounded">onPressed</code>{" "}
          이벤트만 발행하고, 실제 동작(카메라 전환, 문 열기 등)은 인스펙터에서 연결된
          리스너가 각자 담당한다. 오브젝트 간 결합을 최소화하기 위한 설계다.
        </Feature>

        <Feature title="BoxCast 기반 커스텀 이동 — CharacterController2D" code={CODE_2}>
          Kinematic Rigidbody2D를 두고, 매 프레임 BoxCast로 이동 가능 거리를 직접
          계산한다. Unity 기본 물리 충돌에 의존하지 않아 예측 가능한 조작감을 얻는
          대신, 다른 물리 오브젝트와의 상호작용은 전부 직접 구현해야 하는 트레이드오프가
          있다.
        </Feature>
      </section>

      {/* 회고 */}
      <section>
        <SectionTitle index="04" title="회고" />
        <div className="grid md:grid-cols-3 gap-10">
          <RetroColumn
            label="달성"
            tone="good"
            items={[
              "Shift 매칭이라는 단일 규칙으로 이동·퍼즐·전투를 관통시키는 데 성공",
              "커스텀 BoxCast 컨트롤러로 예측 가능한 조작감 확보",
              "UnityEvent 기반으로 트리거-리스너를 느슨하게 연결해 재사용성 확보",
            ]}
          />
          <RetroColumn
            label="아쉬움"
            tone="bad"
            items={[
              "피격·클리어 등 상태 변화에 대한 시청각 피드백 부재",
              "커스텀 물리와 Unity 기본 물리가 혼재하는 구간의 충돌 경계 버그",
              "사운드가 전무한 상태로 빌드됨",
            ]}
          />
          <RetroColumn
            label="계획"
            tone="next"
            items={[
              "Sound Manager 신설, 상황별 BGM·SFX 도입",
              "피격 시 화면 흔들림·비네트, 클리어 시 배너 연출 추가",
              "끼임·보스 사각지대 등 알려진 충돌 버그 해소",
            ]}
          />
        </div>
      </section>

      <footer className="mt-28 pt-8 border-t border-ink/10 text-sm text-ink/30">
        Shifter — Mid Twilight
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
